name: Repository language check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  language-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify repository language
        run: python scripts/check_repository_language.py
